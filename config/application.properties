# Скопируйте из application.properties.example и измените под этот ПК.
# Перекрывает настройки из JAR. Пути — относительно папки run.bat.

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/exchange_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# MICEX / ASTS Bridge
app.gateway.mode=asts-bridge
app.gateway.host=localhost:15005
app.gateway.server=EQ_TEST
app.gateway.interface=IFCBroker36
app.gateway.feedback=IFC_Broker18
app.gateway.user-id=MD9040400002
app.gateway.password=

# Нативные DLL (относительно корня проекта)
app.micex.native.dir=native/win64

# Секция рынка FX
app.loader.type-section-fn=gc_mmvb_sect_fx
app.db.auto-connect-on-start=true

# Prometheus / Actuator → http://localhost:8080/actuator/prometheus
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=LoaderMicexFX
