app.micex.native.dir=native/win64

server.port=8080

logging.charset.console=UTF-8
logging.charset.file=UTF-8
spring.datasource.url=jdbc:postgresql://localhost:5432/exchange_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=never
app.poll-ms=1000

app.loader.timer.deal-seconds=0
app.loader.timer.quote-seconds=10
app.loader.timer.settings-seconds=9000
app.loader.bool-true=81
app.loader.timer.deal-enabled=true
app.loader.tesystime.sync-interval-sec=30

app.loader.type-section-fn=gc_mmvb_sect_fx

app.loader.reconnect-on-error=true
app.loader.reconnect-max-attempts=2

app.gateway.connect-max-attempts=20
app.gateway.connect-retry-delay-ms=300

app.gateway.mode=asts-bridge
app.gateway.packet-size=60000
app.gateway.host=localhost:15005
app.gateway.server=EQ_TEST
app.gateway.interface=IFCBroker36
app.gateway.feedback=IFC_Broker18
app.gateway.user-id=
app.gateway.password=
app.gateway.board=ALL
app.loader.board.if-load-exch-data=81

app.loader.security.filter-enabled=true

app.loader.ui.load-decimals=true
app.loader.ui.load-boards=true

app.parse.max-rows=2000

app.loader.db.verify-buff-id=false
app.loader.db.poll-enabled=true
app.loader.db.poll-ms=30000

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.enable.all=false
