<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="csrf">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
</th:block>

<th:block th:fragment="pageHead(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">LoaderMicexFX</title>
    <link rel="stylesheet" th:href="@{/css/fund.css}"/>
</th:block>

<th:block th:fragment="topbar(navActive)">
    <div class="fund-shell fund-topbar">
        <a class="fund-brand" th:href="@{/loader}" title="Состояние загрузчика">
            <img th:src="@{/img/logomini2.png}" alt="Логотип" width="36" height="36"/>
            <span class="fund-brand-text">ФОНД. Универсальный поток</span>
        </a>
        <nav class="fund-nav">
            <a th:href="@{/loader}" th:classappend="${navActive == 'status'} ? ' active' : ''">Состояние</a>
            <a th:href="@{/loader/settings}" th:classappend="${navActive == 'settings'} ? ' active' : ''">Настройки</a>
            <a th:href="@{/loader/data}" th:classappend="${navActive == 'data'} ? ' active' : ''">Данные</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-link">Выход</button>
            </form>
        </nav>
    </div>
</th:block>

</body>
</html>
