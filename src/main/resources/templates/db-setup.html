<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение к базе данных</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; background: #f5f5f5; }
        h2 { margin-top: 0; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; max-width: 640px; }
        label { display: block; font-size: 0.9rem; color: #333; margin: 12px 0 4px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; font-family: Consolas, monospace; }
        .row { display: flex; gap: 12px; }
        .row > div { flex: 1; }
        .row .port { flex: 0 0 120px; }
        .actions { margin-top: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        button, .btn-link { padding: 8px 16px; cursor: pointer; }
        .btn-primary { background: #1565c0; color: #fff; border: none; border-radius: 4px; }
        .btn-secondary { background: #eee; border: 1px solid #ccc; border-radius: 4px; text-decoration: none; color: #333; display: inline-block; }
        .error { color: #b00020; margin-top: 12px; font-weight: bold; }
        .hint { font-size: 0.85rem; color: #666; margin-top: 4px; }
        .ok { color: #2e7d32; font-size: 0.9rem; }
    </style>
</head>
<body>
<h2>LoaderMicexFX — подключение к PostgreSQL</h2>

<div class="card">
    <p class="hint">Поля заполнены из <code>application.properties</code>. Нажмите «Подключиться» — после успешной проверки откроется страница загрузчика MICEX.</p>
    <p th:if="${connected}" class="ok">База подключена. Можно перейти к загрузчику или изменить параметры и подключиться снова.</p>

    <form th:action="@{/db/connect}" th:object="${db}" method="post" id="dbForm">
        <label for="jdbcUrl">URL (JDBC)</label>
        <input id="jdbcUrl" type="text" th:field="*{jdbcUrl}" placeholder="jdbc:postgresql://localhost:5432/exchange_db"/>

        <div class="row">
            <div>
                <label for="host">Хост</label>
                <input id="host" type="text" th:field="*{host}" placeholder="localhost"/>
            </div>
            <div class="port">
                <label for="port">Порт</label>
                <input id="port" type="number" th:field="*{port}" min="1" max="65535"/>
            </div>
        </div>

        <label for="database">База данных</label>
        <input id="database" type="text" th:field="*{database}" placeholder="exchange_db"/>

        <label for="username">Пользователь</label>
        <input id="username" type="text" th:field="*{username}" autocomplete="username"/>

        <label for="password">Пароль</label>
        <input id="password" type="password" th:field="*{password}" autocomplete="current-password"/>

        <p th:if="${error}" class="error" th:text="${error}">Ошибка</p>

        <div class="actions">
            <button type="submit" class="btn-primary">Подключиться</button>
            <a th:if="${connected}" th:href="@{/loader}" class="btn-secondary">Загрузчик MICEX</a>
        </div>
    </form>
</div>

<script>
    (function () {
        const host = document.getElementById('host');
        const port = document.getElementById('port');
        const database = document.getElementById('database');
        const jdbcUrl = document.getElementById('jdbcUrl');

        function rebuildUrl() {
            const h = (host.value || 'localhost').trim();
            const p = (port.value || '5432').trim();
            const db = (database.value || 'exchange_db').trim();
            jdbcUrl.value = 'jdbc:postgresql://' + h + ':' + p + '/' + db;
        }

        host.addEventListener('change', rebuildUrl);
        port.addEventListener('change', rebuildUrl);
        database.addEventListener('change', rebuildUrl);
    })();
</script>
</body>
</html>
